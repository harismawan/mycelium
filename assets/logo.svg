<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mushroom cap -->
  <path d="M20 45 C20 20, 80 20, 80 45 L20 45Z" fill="#e0e0e0" opacity="0.95"/>
  <!-- Cap dots -->
  <circle cx="38" cy="32" r="2.5" fill="#181818" opacity="0.5"/>
  <circle cx="52" cy="28" r="2" fill="#181818" opacity="0.5"/>
  <circle cx="62" cy="35" r="2.5" fill="#181818" opacity="0.5"/>
  <circle cx="45" cy="38" r="1.8" fill="#181818" opacity="0.5"/>
  <!-- Stem -->
  <rect x="44" y="45" width="12" height="14" rx="1" fill="#e0e0e0" opacity="0.7"/>
  <!-- Mycelium roots -->
  <g stroke="#e0e0e0" stroke-width="1.2" fill="none" opacity="0.6">
    <line x1="50" y1="59" x2="50" y2="68"/>
    <line x1="50" y1="62" x2="30" y2="78"/>
    <line x1="50" y1="62" x2="70" y2="78"/>
    <line x1="50" y1="65" x2="22" y2="72"/>
    <line x1="50" y1="65" x2="78" y2="72"/>
    <line x1="50" y1="63" x2="36" y2="82"/>
    <line x1="50" y1="63" x2="64" y2="82"/>
    <line x1="50" y1="64" x2="42" y2="76"/>
    <line x1="50" y1="64" x2="58" y2="76"/>
    <line x1="50" y1="66" x2="26" y2="84"/>
    <line x1="50" y1="66" x2="74" y2="84"/>
  </g>
  <!-- Root nodes -->
  <g fill="#e0e0e0" opacity="0.7">
    <circle cx="30" cy="78" r="2.5"/>
    <circle cx="70" cy="78" r="2.5"/>
    <circle cx="22" cy="72" r="2"/>
    <circle cx="78" cy="72" r="2"/>
    <circle cx="36" cy="82" r="2"/>
    <circle cx="64" cy="82" r="2"/>
    <circle cx="42" cy="76" r="1.5"/>
    <circle cx="58" cy="76" r="1.5"/>
    <circle cx="26" cy="84" r="2.5"/>
    <circle cx="74" cy="84" r="2.5"/>
    <circle cx="50" cy="68" r="2"/>
  </g>
  <!-- Root node outlines -->
  <g stroke="#e0e0e0" stroke-width="1" fill="none" opacity="0.4">
    <circle cx="22" cy="72" r="3.5"/>
    <circle cx="78" cy="72" r="3.5"/>
    <circle cx="42" cy="76" r="3"/>
    <circle cx="58" cy="76" r="3"/>
  </g>
  <!-- Brand text -->
  <text x="100" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="300" letter-spacing="1.5" fill="#e0e0e0">mycelium</text>
  <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1.2" text-transform="uppercase" fill="#999">A KNOWLEDGE NETWORK</text>
