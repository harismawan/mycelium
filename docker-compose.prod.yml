services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      MCP_TRANSPORT: http
      MCP_PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"

  # Run migrations on startup
  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    command: bunx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

volumes:
  redisdata:
