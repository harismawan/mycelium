services:
  postgres:
    image: postgres:16
    profiles: ["localdb"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: mycelium
      POSTGRES_PASSWORD: mycelium
      POSTGRES_DB: mycelium
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelium"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MCP_TRANSPORT: http
      MCP_PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"

  # Run migrations on startup
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: bunx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

volumes:
  pgdata:
