apiVersion: v1
kind: Secret
metadata:
  name: mycelium-secrets
type: Opaque
stringData:
  # CHANGE THESE VALUES BEFORE APPLYING
  DATABASE_URL: "postgresql://user:password@postgresql:5432/mycelium?schema=public"
  JWT_SECRET: "change-this-to-a-secure-random-string"
  MYCELIUM_API_KEY: "change-this-to-a-secure-api-key"
